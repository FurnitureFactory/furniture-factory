<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Furniture Factory | Customise your standing desk</title>
  <meta name="description" content="Build your standing desk: choose motor, frame colour, wood top, size and edge. Live preview and pricing in SGD." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect fill='%235f6b39' width='32' height='32' rx='4'/%3E%3Cpath fill='%23f4efe6' d='M11 20A7 7 0 0 1 4 13c0-5 4.5-9 16-9-1 8-5 13-9 16Z'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/critical-chrome.css" />
  <link rel="stylesheet" href="/shared.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
    }
  }
  </script>
  <link rel="modulepreload" href="https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js" />
  <script type="module">
  try {
    await import("./desk-preview-3d.js");
  } catch (err) {
    console.error("desk-preview-3d failed", err);
    window.dispatchEvent(new Event("desk3d-error"));
  }
  </script>
  <style>
:root{
  --backdrop:#d4d0c5;
  --paper:#f3efe7;
  --surface:#faf7f1;
  --surface-2:#fefdfb;
  --mat:#f6f3ec;
  --sunken:#ece8df;
  --ink:#2b2a23;
  --ink-2:#5b5648;
  --muted:#8d8676;
  --olive:#5f6b39;
  --olive-d:#49521f;
  --olive-soft:#eceedd;
  --oak:#c39a5f;
  --forest:#3f6b4a;
  --line:rgba(67,57,36,.13);
  --line-2:rgba(67,57,36,.2);
  --serif:"Cormorant Garamond",Georgia,"Times New Roman",serif;
  --sans:"Manrope","Helvetica Neue",Helvetica,sans-serif;
  --mono:ui-monospace,"SF Mono",Menlo,monospace;
  --ease:cubic-bezier(.32,.08,.24,1);
}
*{box-sizing:border-box;}
html,body{margin:0;}
body{background:#f6f4f0;color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;
  padding:0;min-height:100vh;}
button{font-family:var(--sans);cursor:pointer;}
::selection{background:var(--olive);color:#fff;}

/* page lead + layout shell */
.site.site--customise{display:flex;flex-direction:column;min-height:100dvh;padding-bottom:calc(var(--site-foot-h,58px) + 4px);}
.site.site--customise > .page-lead{flex-shrink:0;}
.site.site--customise > .wrap{
  flex:1;
  padding-bottom:24px;align-items:start;
}

/* layout — preview | options */
.wrap{padding:0 0 48px;display:grid;grid-template-columns:minmax(0,1fr) minmax(340px,400px);gap:20px 28px;align-items:start;max-width:none;margin:0;}
.config-summary .editorial-copy{padding:24px 22px;}
.config-summary__h{margin:0 0 16px;font-family:var(--serif);font-weight:500;font-size:22px;color:var(--ink);line-height:1.1;}
.config-summary__list{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:10px;}
.config-summary__item{display:flex;flex-direction:column;gap:2px;padding-bottom:10px;border-bottom:1px solid rgba(67,57,36,.1);}
.config-summary__item:last-child{border-bottom:none;padding-bottom:0;}
.config-summary__label{font-size:9px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-2);}
.config-summary__val{font-size:13px;font-weight:700;color:var(--ink);line-height:1.35;}
.config-summary__price{margin-top:18px;padding-top:16px;border-top:1px solid rgba(67,57,36,.12);}
.config-summary__price dt{font-size:9px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-2);margin:0 0 4px;}
.config-summary__price dd{margin:0;font-family:var(--serif);font-size:28px;font-weight:500;color:var(--ink);}
.config-summary__hint{margin:14px 0 0;font-size:11px;line-height:1.5;color:var(--ink-2);font-weight:500;}
.customise-aside{display:flex;flex-direction:column;gap:20px;min-width:0;}
.stage{position:sticky;top:var(--preview-sticky-top,68px);align-self:start;z-index:2;width:100%;min-width:0;max-width:100%;}

/* framed live preview — height + sticky top synced in customise-preview-scroll.js */
.viewer{position:relative;display:flex;flex-direction:column;height:var(--preview-height,min(720px,calc(100dvh - var(--site-foot-h,58px) - var(--preview-gap,14px)*2 - 72px)));min-height:420px;max-height:720px;width:100%;max-width:100%;
  border:none;background:linear-gradient(165deg,rgba(255,255,255,.94) 0%,rgba(246,244,240,.86) 100%);backdrop-filter:blur(22px) saturate(.95);-webkit-backdrop-filter:blur(22px) saturate(.95);
  padding:16px;overflow:hidden;border-radius:20px;box-sizing:border-box;
  box-shadow:0 10px 36px rgba(40,34,18,.06),inset 0 1px 0 rgba(255,255,255,.85);}
.viewer__head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-shrink:0;margin-bottom:12px;padding:0 2px;}
.viewer__tag{font-size:10px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;color:var(--ink);}
.viewer__meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;text-align:right;min-width:0;}
.viewer__hint{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-2);white-space:nowrap;}
.viewer__price{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-2);white-space:nowrap;}
.viewer__price b{font-family:var(--serif);font-size:22px;font-weight:500;color:var(--ink);margin-right:4px;}
.viewer__body{position:relative;flex:1;min-height:0;display:flex;flex-direction:column;gap:0;}
.viewer__topbar{display:block;flex-shrink:0;margin-bottom:10px;padding:0;width:100%;}
.viewer__topbar .viewer__toolbar{margin:0;width:100%;}
.scene{position:relative;width:100%;flex:1;min-height:280px;overflow:hidden;border-radius:14px;
  background:transparent;touch-action:none;user-select:none;
  display:flex;align-items:center;justify-content:center;}
.scene--drag{cursor:grab;}
.scene--dragging{cursor:grabbing;}
.scene--3d{position:relative;flex:1;min-height:280px;width:100%;}
.desk-stage{position:relative;display:flex;align-items:center;justify-content:center;width:100%;height:100%;padding:0;box-sizing:border-box;}
.desk-stage--3d{position:absolute;top:0;left:0;right:0;bottom:0;z-index:2;padding:0;}
.desk-canvas{position:absolute;inset:0;width:100%;height:100%;min-height:200px;overflow:hidden;border-radius:14px;pointer-events:auto;touch-action:none;}
.desk-canvas canvas{display:block;position:absolute;inset:0;width:100%!important;height:100%!important;touch-action:none;cursor:grab;outline:none;}
.desk-canvas canvas:active{cursor:grabbing;}
.desk-preview-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:1;pointer-events:none;
  font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-2);}
.desk-v{position:relative;display:flex;flex-direction:column;align-items:center;margin:0 auto;filter:drop-shadow(0 14px 12px rgba(40,34,18,.14));}
.desk-v__shadow{position:absolute;left:50%;bottom:-6px;transform:translateX(-50%);height:10px;border-radius:50%;
  background:radial-gradient(ellipse at center,rgba(40,34,18,.22),transparent 72%);filter:blur(5px);pointer-events:none;}
.desk-v__top{width:100%;position:relative;z-index:2;}
.desk-v__face{width:100%;position:relative;overflow:hidden;border-radius:3px 3px 0 0;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.42),0 1px 0 rgba(67,57,36,.08);}
.desk-v__face.is-curve{border-radius:10px 10px 2px 2px;}
.desk-v__grain{position:absolute;inset:0;pointer-events:none;opacity:.85;}
.desk-v__edge{width:100%;position:relative;overflow:hidden;
  box-shadow:0 4px 10px -6px rgba(40,34,18,.35),inset 0 -1px 0 rgba(0,0,0,.1);}
.desk-v__edge.is-plywood::after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,.1) 0 1px,rgba(255,255,255,.16) 1px 4px);opacity:.55;}
.desk-v__frame-wrap{width:100%;display:flex;justify-content:center;}
.desk-v__frame{position:relative;z-index:1;margin-top:-1px;display:flex;flex-direction:column;align-items:stretch;flex:none;}
.desk-v__beam{width:100%;border-radius:2px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.28),0 2px 4px rgba(40,34,18,.18);}
.desk-v__legs{position:relative;width:100%;margin-top:-1px;}
.desk-v__leg{position:absolute;bottom:0;display:flex;flex-direction:column;align-items:center;transform:translateX(-50%);}
.desk-v__upper{border-radius:2px 2px 0 0;
  box-shadow:inset 1px 0 0 rgba(255,255,255,.18),inset -1px 0 0 rgba(0,0,0,.1);}
.desk-v__lower{border-radius:0;
  box-shadow:inset 1px 0 0 rgba(255,255,255,.14),inset -1px 0 0 rgba(0,0,0,.12);}
.desk-v__foot{border-radius:2px;margin-top:1px;
  box-shadow:0 5px 8px -4px rgba(40,34,18,.45),inset 0 1px 0 rgba(255,255,255,.12);}
.desk-v__motor{position:absolute;top:0;height:14px;border-radius:2px;
  background:linear-gradient(180deg,rgba(255,255,255,.28),rgba(40,34,18,.12));box-shadow:0 1px 2px rgba(40,34,18,.15);}
.desk-v__motor-dot{position:absolute;width:4px;height:4px;border-radius:50%;background:var(--oak);top:5px;}
.desk-v--top .desk-v__face{border-radius:6px;box-shadow:inset 0 1px 0 rgba(255,255,255,.4),0 8px 20px -8px rgba(40,34,18,.25);}
.desk-v--top .desk-v__edge{display:none;}
.desk-v--side{align-items:stretch;}
.desk-v--side .desk-v__top{width:100%;}
.desk-v--side .desk-v__face{border-radius:3px 3px 0 0;}
.preview-tween,.preview-tween *{transition:width .45s var(--ease),height .45s var(--ease),background .35s var(--ease),border-radius .35s var(--ease);}
.viewer__toolbar{position:relative;z-index:5;display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:4px;width:100%;flex-shrink:0;
  background:rgba(255,255,255,.88);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-radius:10px;
  box-shadow:0 2px 12px rgba(40,34,18,.05);border:1px solid rgba(67,57,36,.06);}
.viewer__viewbtn{appearance:none;border:1px solid transparent;background:transparent;color:var(--ink-2);
  font-family:var(--sans);font-size:9px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;padding:9px 8px;border-radius:8px;cursor:pointer;
  width:100%;text-align:center;
  transition:background .15s,color .15s,border-color .15s;}
.viewer__viewbtn:hover{color:var(--ink);background:rgba(255,255,255,.6);}
.viewer__viewbtn.on{color:var(--olive-d);background:#fff;border-color:rgba(95,107,57,.25);}
.scene__dims{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);z-index:5;text-align:center;pointer-events:none;
  font-size:11px;font-weight:600;letter-spacing:.06em;color:var(--ink-2);transition:opacity .35s var(--ease);
  padding:7px 14px;max-width:calc(100% - 20px);background:rgba(252,249,243,.94);border:1px solid rgba(67,57,36,.1);
  border-radius:8px;box-shadow:0 2px 10px rgba(40,34,18,.06);white-space:nowrap;}
.scene__dims b{color:var(--ink);font-weight:700;}
/* your build — floated inside 3D preview */
.build-overlay{
  position:absolute;left:10px;top:10px;bottom:auto;z-index:6;
  max-width:min(272px,calc(100% - 20px));max-height:calc(100% - 20px);
  display:flex;flex-direction:column;pointer-events:none;
  transition:opacity .25s var(--ease),transform .25s var(--ease);
}
.build-overlay.is-hidden{opacity:0;visibility:hidden;pointer-events:none;transform:translateY(-6px);}
.build-overlay .editorial-copy{
  flex:0 1 auto;display:flex;flex-direction:column;min-height:0;pointer-events:auto;
  padding:12px 14px 10px;
  background:rgba(252,249,243,.96);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1px solid rgba(67,57,36,.1);border-radius:12px;box-shadow:0 8px 28px rgba(40,34,18,.12);
}
.build-overlay__head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;flex-shrink:0;}
.build-overlay .config-summary__h{margin:0;font-size:16px;line-height:1.1;}
.build-overlay__toggle{
  appearance:none;border:none;background:transparent;
  width:22px;height:22px;border-radius:6px;display:grid;place-items:center;padding:0;
  color:var(--muted);cursor:pointer;flex:none;opacity:.55;
  transition:opacity .15s,background .15s,color .15s;
}
.build-overlay__toggle:hover{opacity:1;background:rgba(67,57,36,.06);color:var(--ink-2);}
.build-overlay__toggle svg{display:block;opacity:.9;}
.build-overlay .config-summary__list{display:contents;}
.build-overlay__body{
  flex:0 1 auto;display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;
  align-content:start;min-height:0;
}
.build-overlay .config-summary__item{padding-bottom:0;border-bottom:none;min-width:0;}
.build-overlay .config-summary__label{font-size:7.5px;letter-spacing:.14em;}
.build-overlay .config-summary__val{font-size:11px;line-height:1.25;}
.build-overlay .config-summary__price{
  margin-top:8px;padding-top:8px;grid-column:1/-1;
  border-top:1px solid rgba(67,57,36,.1);
}
.build-overlay .config-summary__price dt{margin-bottom:2px;}
.build-overlay .config-summary__price dd{font-size:19px;}
.build-overlay .config-summary__hint{margin-top:8px;font-size:9px;line-height:1.4;grid-column:1/-1;display:none;}
.build-overlay-tab{
  position:absolute;left:12px;top:12px;z-index:6;pointer-events:auto;
  appearance:none;border:1px solid rgba(67,57,36,.12);background:rgba(252,249,243,.96);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-radius:999px;padding:8px 14px;font-family:var(--sans);font-size:9px;font-weight:800;
  letter-spacing:.14em;text-transform:uppercase;color:var(--ink-2);cursor:pointer;
  box-shadow:0 4px 16px rgba(40,34,18,.1);transition:background .15s,color .15s,border-color .15s;
}
.build-overlay-tab:hover{background:#fff;color:var(--ink);border-color:rgba(67,57,36,.18);}
.desk-canvas{z-index:3;}
.build-overlay,.build-overlay-tab{z-index:8;}
.scene--3d.scene--desk-front .desk-canvas{z-index:7;}
.scene--3d.scene--desk-front .build-overlay,.scene--3d.scene--desk-front .build-overlay-tab{z-index:8;}

/* panel — options glass card */
.customise-aside .panel.glass-panel{padding:24px 26px 22px;}
.panel{padding:24px 26px 22px;flex-shrink:0;}
.customise-aside .summary{margin-top:0;padding:0;flex-shrink:0;}
.section{padding:0 0 24px;margin:0 0 24px;border-bottom:none;}
.section:last-of-type{margin-bottom:0;padding-bottom:0;}
.section__title{display:flex;align-items:center;gap:12px;font-family:var(--serif);font-weight:400;font-size:24px;letter-spacing:.01em;margin:0 0 8px;color:var(--ink);}
.section__title .n{display:inline-grid;place-items:center;width:26px;height:26px;border-radius:8px;background:var(--olive);
  color:#f4efe6;font-family:var(--sans);font-size:11px;font-weight:700;}
.section__note{margin:0 0 18px;font-size:12.5px;line-height:1.55;color:var(--ink-2);font-weight:500;}

.group{margin:0 0 20px;}
.group:last-child{margin-bottom:0;}
.group__head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;gap:12px;}
.group__label{font-size:10.5px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--ink);}
.group__val{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--olive-d);}

.opts{display:grid;gap:12px;}
.opts--2{grid-template-columns:1fr 1fr;}
.opts--3{grid-template-columns:repeat(3,1fr);}
.opt{position:relative;text-align:left;background:rgba(255,255,255,.94);
  border:none;border-radius:12px;
  padding:15px 17px;color:var(--ink);box-shadow:0 2px 12px rgba(40,34,18,.06);
  transition:box-shadow .18s var(--ease),transform .14s var(--ease),background .18s;display:flex;flex-direction:column;gap:5px;}
.opt:hover{box-shadow:0 6px 20px rgba(40,34,18,.09);transform:translateY(-2px);background:#fff;}
.opt.on{background:#f2f4e8;transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(95,107,57,.16);}
.opt__check{position:absolute;top:10px;right:10px;width:18px;height:18px;border-radius:99px;background:var(--olive);
  display:none;place-items:center;color:#fff;}
.opt.on .opt__check{display:grid;}
.opt__name{font-size:15px;font-weight:700;letter-spacing:-.005em;padding-right:22px;color:var(--ink);}
.opt__meta{font-size:12px;line-height:1.5;color:var(--ink-2);font-weight:500;}
.opt__price{font-size:11.5px;font-weight:700;letter-spacing:.04em;color:var(--olive-d);margin-top:3px;}
.opt__price.zero{color:var(--ink-2);font-weight:600;}
.opt--swatch{flex-direction:row;align-items:center;gap:12px;padding:11px 14px;}
.swatch{width:30px;height:30px;border-radius:6px;flex:none;box-shadow:none;}
.opt--swatch .col{display:flex;flex-direction:column;gap:1px;}
.opt--pill{align-items:center;text-align:center;padding:13px 6px;gap:2px;}
.opt--pill .opt__name{padding-right:0;font-size:16px;}
.opt--pill .unit{font-size:11px;color:var(--muted);font-weight:600;}
.soon{display:inline-block;margin-left:6px;font-size:8px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:#7a5a1c;background:#f1e7cf;border-radius:0;padding:2px 5px;vertical-align:middle;}

/* summary — landing glass card */
.summary .editorial-copy{padding:32px 34px;}
.summary__h{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px;gap:12px;}
.summary__h h3{margin:0;font-family:var(--serif);font-weight:500;font-size:24px;color:var(--ink);}
.summary__h span{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-2);}
.bill{display:flex;flex-direction:column;gap:10px;}
.bill__r{display:flex;align-items:baseline;justify-content:space-between;gap:14px;font-size:13.5px;}
.bill__r dt{color:var(--ink);font-weight:600;}
.bill__r dd{margin:0;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums;}
.bill__r dd.zero{color:var(--ink-2);font-weight:600;}
.bill__rule{height:0;border:0;margin:20px 0;}
.bill__t{display:flex;align-items:baseline;justify-content:space-between;}
.bill__t dt{font-size:11px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-2);}
.bill__t dd{margin:0;font-family:var(--serif);font-weight:500;font-size:36px;color:var(--ink);letter-spacing:.01em;}
.bill__t dd small{font-family:var(--sans);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-2);margin-left:6px;}

.btns{margin-top:20px;display:flex;flex-direction:column;gap:10px;}
.btn{width:100%;display:inline-flex;align-items:center;justify-content:center;gap:9px;border:1px solid transparent;
  border-radius:12px;font-size:11px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;padding:15px 18px;
  transition:background .15s,border-color .15s,color .15s,transform .1s,box-shadow .15s;}
.btn--primary{background:var(--olive);color:#fff;border-color:var(--olive);box-shadow:0 2px 8px rgba(95,107,57,.25);}
.btn--primary:hover{background:var(--olive-d);border-color:var(--olive-d);}
.btn--primary:active{transform:translateY(1px);}
.btn--ghost{background:rgba(255,255,255,.7);color:var(--olive-d);border:none;box-shadow:0 2px 10px rgba(40,34,18,.06);}
.btn--ghost:hover{background:rgba(255,255,255,.9);box-shadow:0 4px 14px rgba(40,34,18,.08);}
.btn--ghost.added{color:#2d5a28;background:#f0f5ee;}
.fine{margin:16px 0 0;text-align:center;font-size:11.5px;line-height:1.55;color:var(--ink-2);font-weight:500;}
.assure{margin-top:16px;display:flex;gap:16px;flex-wrap:wrap;justify-content:center;}
.assure span{font-size:11px;font-weight:700;letter-spacing:.03em;color:var(--ink);display:inline-flex;align-items:center;gap:5px;}
.assure svg{color:var(--olive);flex:none;}

/* toast */
.toast{position:fixed;right:24px;bottom:24px;z-index:120;background:var(--ink);color:#f3f1e6;border-radius:0;
  padding:15px 19px;max-width:330px;box-shadow:0 24px 50px -20px rgba(40,34,18,.6);transform:translateY(18px);opacity:0;pointer-events:none;
  transition:transform .3s var(--ease),opacity .3s;}
.toast.show{transform:translateY(0);opacity:1;}

      this._img.addEventListener('load', () => this._applyView());
      // Gated on editable + fit=cover so share links and contain/fill slots
      // stay static.
      this.addEventListener('dblclick', (e) => {
        if (!this.hasAttribute('data-editable') || !this._reframes()) return;
        e.preventDefault();
        if (this.hasAttribute('data-reframe')) this._exitReframe(true);
        else this._enterReframe();
      });
      // Pan + resize both originate on the spill layer. A handle pointerdown
      // drives an aspect-locked resize anchored at the opposite corner; any
      // other pointerdown on the spill pans. Offsets are frame-% so a
      // reframed slot survives responsive resize / PPTX export.
      this._spill.addEventListener('pointerdown', (e) => {
        if (e.button !== 0 || !this.hasAttribute('data-reframe')) return;
        e.preventDefault();
        e.stopPropagation();
        this._spill.setPointerCapture(e.pointerId);
        const rect = this.getBoundingClientRect();
        const fw = rect.width || 1, fh = rect.height || 1;
        const corner = e.target.getAttribute && e.target.getAttribute('data-c');
        let move;
        if (corner) {
          // Resize about the OPPOSITE corner. Viewport-px throughout (rect
          // fw/fh, not clientWidth) so the math survives a transform:scale()
          // ancestor — deck_stage renders slides scaled-to-fit.
          const iw = this._img.naturalWidth || 1, ih = this._img.naturalHeight || 1;
          const base = Math.max(fw / iw, fh / ih);
          const sx = corner.includes('e') ? 1 : -1;
          const sy = corner.includes('s') ? 1 : -1;
          const s0 = this._view.s;
          const w0 = iw * base * s0, h0 = ih * base * s0;
          const cx0 = (50 + this._view.x) / 100 * fw;
          const cy0 = (50 + this._view.y) / 100 * fh;
          const ox = cx0 - sx * w0 / 2, oy = cy0 - sy * h0 / 2;
          const diag0 = Math.hypot(w0, h0);
          const ux = sx * w0 / diag0, uy = sy * h0 / diag0;
          move = (ev) => {
            const proj = (ev.clientX - rect.left - ox) * ux +
                         (ev.clientY - rect.top - oy) * uy;
            const s = clampS(s0 * proj / diag0);
            const d = diag0 * s / s0;
            this._view.s = s;
            this._view.x = (ox + ux * d / 2) / fw * 100 - 50;
            this._view.y = (oy + uy * d / 2) / fh * 100 - 50;
            this._clampView();
            this._applyView();
          };
        } else {
          this.setAttribute('data-panning', '');
          const start = { px: e.clientX, py: e.clientY, x: this._view.x, y: this._view.y };
          move = (ev) => {
            this._view.x = start.x + (ev.clientX - start.px) / fw * 100;
            this._view.y = start.y + (ev.clientY - start.py) / fh * 100;
            this._clampView();
            this._applyView();
          };

        const up = () => {
          try { this._spill.releasePointerCapture(e.pointerId); } catch {}
          this._spill.removeEventListener('pointermove', move);
          this._spill.removeEventListener('pointerup', up);
          this._spill.removeEventListener('pointercancel', up);
          this.removeAttribute('data-panning');
          this._dragUp = null;
        };
        // Stashed so _exitReframe (Escape / outside-click mid-drag) can
        // tear the capture + listeners down synchronously.
        this._dragUp = up;
        this._spill.addEventListener('pointermove', move);
        this._spill.addEventListener('pointerup', up);
        this._spill.addEventListener('pointercancel', up);
      });
      // Wheel zoom stays available inside reframe mode as a trackpad nicety —
      // zooms toward the cursor (offset' = cursor·(1-k) + offset·k).
      this.addEventListener('wheel', (e) => {
        if (!this.hasAttribute('data-reframe')) return;
        e.preventDefault();
        const r = this.getBoundingClientRect();
        const cx = (e.clientX - r.left) / r.width * 100 - 50;
        const cy = (e.clientY - r.top) / r.height * 100 - 50;
        const prev = this._view.s;
        const next = clampS(prev * Math.pow(1.0015, -e.deltaY));
        if (next === prev) return;
        const k = next / prev;
        this._view.s = next;
        this._view.x = cx * (1 - k) + this._view.x * k;
        this._view.y = cy * (1 - k) + this._view.y * k;
        this._clampView();
        this._applyView();
      }, { passive: false });
    }

    connectedCallback() {
      // Warn once per page — an id-less slot works for the session but
      // cannot persist, and two id-less slots would share nothing.
      if (!this.id && !ImageSlot._warned) {
        ImageSlot._warned = true;
        console.warn('<image-slot> without an id will not persist its dropped image.');

      this.addEventListener('dragenter', this);
      this.addEventListener('dragover', this);
      this.addEventListener('dragleave', this);
      this.addEventListener('drop', this);
      subs.add(this._subFn);

      // a host resize (responsive grid, pane divider) would stretch the
      // image until the next _render. Re-render on size change: _render()
      // re-seeds _view from stored before clamp/apply, so a shrink→grow
      // cycle round-trips instead of ratcheting x/y toward the narrower
      // frame's clamp range.
      this._ro = new ResizeObserver(() => this._render());
      this._ro.observe(this);

    disconnectedCallback() {
      subs.delete(this._subFn);
      this.removeEventListener('dragenter', this);
      this.removeEventListener('dragover', this);
      this.removeEventListener('dragleave', this);
      this.removeEventListener('drop', this);
      if (this._ro) { this._ro.disconnect(); this._ro = null; }
      this._exitReframe(false);
    }

    _enterReframe() {
      if (this.hasAttribute('data-reframe')) return;
      this.setAttribute('data-reframe', '');
      this._applyView();
      // Close on click outside (the spill handler stopPropagation()s so
      // in-image drags don't reach this) and on Escape. Listeners are held
      // on the instance so _exitReframe / disconnectedCallback can detach
      // exactly what was attached.
      this._outside = (e) => {
        if (e.composedPath && e.composedPath().includes(this)) return;
        this._exitReframe(true);
      };
      this._esc = (e) => { if (e.key === 'Escape') this._exitReframe(true); };
      document.addEventListener('pointerdown', this._outside, true);
      document.addEventListener('keydown', this._esc, true);

    _exitReframe(commit) {
      if (!this.hasAttribute('data-reframe')) return;
      if (this._dragUp) this._dragUp();
      this.removeAttribute('data-reframe');
      this.removeAttribute('data-panning');
      if (this._outside) document.removeEventListener('pointerdown', this._outside, true);
      if (this._esc) document.removeEventListener('keydown', this._esc, true);
      this._outside = this._esc = null;
      if (commit) this._commitView();

    attributeChangedCallback() { if (this.shadowRoot) this._render(); }

    // handleEvent — one listener object for all four drag events keeps the
    // add/remove symmetric and the depth counter correct.
    handleEvent(e) {

        e.preventDefault();

        // so hovering the icon inside the empty state doesn't flicker.
        if (--this._depth <= 0) { this._depth = 0; this.removeAttribute('data-over'); }
      } else if (e.type === 'drop') {
        e.preventDefault();
        e.stopPropagation();
        this._depth = 0;
        this.removeAttribute('data-over');
        const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
        if (f) this._ingest(f);

    async _ingest(file) {
      this._setError(null);
      if (!file || ACCEPT.indexOf(file.type) < 0) {
        this._setError('Drop a PNG, JPEG, WebP, or AVIF image.');
        return;
      }
      // toDataUrl can take hundreds of ms on a large photo. A Clear or a
      // newer drop during that window would be clobbered when this await
      // resumes — bump + capture a generation so stale encodes bail.
      const gen = ++this._gen;
      try {
        const w = this.clientWidth || this.offsetWidth || MAX_DIM;
        const url = await toDataUrl(file, w);
        if (gen !== this._gen) return;
        // Only exit reframe once the new image is in hand — a rejected type
        // or decode failure leaves the in-progress crop untouched.
        this._exitReframe(false);
        const val = { u: url, s: 1, x: 0, y: 0 };
        setSlot(this.id || '', val);
        // Keep a session-local copy for id-less slots so the drop still
        // shows, even though it cannot persist.
        if (!this.id) { this._local = val; this._render(); }
      } catch (err) {
        if (gen !== this._gen) return;
        this._setError('Could not read that image.');
        console.warn('<image-slot> ingest failed:', err);
      }
    }

    _setError(msg) {
      if (this._err) { this._err.remove(); this._err = null; }
      if (!msg) return;
      const d = document.createElement('div');
      d.className = 'err'; d.textContent = msg;
      this.shadowRoot.appendChild(d);
      this._err = d;
      setTimeout(() => { if (this._err === d) { d.remove(); this._err = null; } }, 3000);
    }

    // Reframing (pan/resize) is only meaningful for fit=cover — contain/fill
    // keep the old object-fit path and double-click is a no-op.
    _reframes() {
      return this.hasAttribute('data-filled') &&
        (this.getAttribute('fit') || 'cover') === 'cover';
    }

    // Cover-baseline geometry, shared by clamp/apply/resize. Null until the
    // img has loaded (naturalWidth is 0 before that) or when the slot has no
    // layout box — ResizeObserver fires with a 0×0 rect under display:none,
    // and clamping against a degenerate 1×1 frame would silently pull the
    // stored pan toward zero.
    _geom() {
      const iw = this._img.naturalWidth, ih = this._img.naturalHeight;
      const fw = this.clientWidth, fh = this.clientHeight;
      if (!iw || !ih || !fw || !fh) return null;
      return { iw, ih, fw, fh, base: Math.max(fw / iw, fh / ih) };
    }

    _clampView() {
      // Pan range on each axis is half the overflow past the frame edge.
      const g = this._geom();
      if (!g) return;
      const mx = Math.max(0, (g.iw * g.base * this._view.s / g.fw - 1) * 50);
      const my = Math.max(0, (g.ih * g.base * this._view.s / g.fh - 1) * 50);
      this._view.x = Math.max(-mx, Math.min(mx, this._view.x));
      this._view.y = Math.max(-my, Math.min(my, this._view.y));
    }

    _applyView() {
      const g = this._geom();
      const fit = this.getAttribute('fit') || 'cover';
      if (fit !== 'cover' || !g) {
        // Non-cover, or dimensions not known yet (before img load).
        this._img.style.width = '100%';
        this._img.style.height = '100%';
        this._img.style.left = '50%';
        this._img.style.top = '50%';
        this._img.style.objectFit = fit;
        this._img.style.objectPosition = this.getAttribute('position') || '50% 50%';
        return;
      }
      // Cover baseline: img fills the frame on its tighter axis at s=1, so
      // pan works immediately on the overflowing axis without zooming first.
      // Width/height and left/top are all frame-% — depends only on the
      // frame aspect ratio, so a responsive resize keeps the same crop. The
      // spill layer mirrors the same box so its corners = image corners.
      const k = g.base * this._view.s;
      const w = (g.iw * k / g.fw * 100) + '%';
      const h = (g.ih * k / g.fh * 100) + '%';
      const l = (50 + this._view.x) + '%';
      const t = (50 + this._view.y) + '%';
      this._img.style.width = w; this._img.style.height = h;
      this._img.style.left = l; this._img.style.top = t;
      this._img.style.objectFit = '';
      this._spill.style.width = w; this._spill.style.height = h;
      this._spill.style.left = l; this._spill.style.top = t;
    }

    _commitView() {
      const v = { s: this._view.s, x: this._view.x, y: this._view.y };
      if (this._userUrl) v.u = this._userUrl;
      // Framing-only (no u) persists too so an author-src slot remembers its
      // crop; clearing the sidecar still falls through to src=.
      if (this.id) setSlot(this.id, v);
      else { this._local = v; }
    }

    _render() {
      // Shape / mask. Presets use border-radius so the dashed ring can
      // follow the rounded outline; clip-path is only applied for an
      // explicit `mask` (the ring is hidden there since a rectangle
      // dashed border chopped by an arbitrary polygon looks broken).
      const mask = this.getAttribute('mask');
      const shape = (this.getAttribute('shape') || 'rounded').toLowerCase();
      let radius = '';
      if (shape === 'circle') radius = '50%';
      else if (shape === 'pill') radius = '9999px';
      else if (shape === 'rounded') {
        const n = parseFloat(this.getAttribute('radius'));
        radius = (Number.isFinite(n) ? n : 12) + 'px';
      }
      this._frame.style.borderRadius = mask ? '' : radius;
      this._frame.style.clipPath = mask || '';
      this._ring.style.borderRadius = mask ? '' : radius;
      this._ring.style.display = mask ? 'none' : '';

      // Controls and reframe entry gate on this so share links stay read-only.
      const editable = !!(window.omelette && window.omelette.writeFile);
      this.toggleAttribute('data-editable', editable);
      this._sub.style.display = editable ? '' : 'none';

      // Content. The sidecar is also writable by the agent's write_file
      // tool, so its value isn't guaranteed canvas-originated — only accept
      // data:image/ URLs from it. The `src` attribute is author-controlled
      // (Claude wrote it into the HTML) so it passes through unchanged.
      let stored = this.id ? getSlot(this.id) : this._local;
      if (stored && stored.u && !/^data:image\//i.test(stored.u)) stored = null;
      const srcAttr = this.getAttribute('src') || '';
      this._userUrl = (stored && stored.u) || null;
      const url = this._userUrl || srcAttr;
      // Don't clobber an in-flight reframe with a store-triggered re-render.
      if (!this.hasAttribute('data-reframe')) {
        this._view = {
          s: stored && Number.isFinite(stored.s) ? clampS(stored.s) : 1,
          x: stored && Number.isFinite(stored.x) ? stored.x : 0,
          y: stored && Number.isFinite(stored.y) ? stored.y : 0,
        };
      }
      this._cap.textContent = this.getAttribute('placeholder') || 'Drop an image';
      // Toggle via style.display — the [hidden] attribute alone loses to
      // the display:flex / display:block rules in the stylesheet above.
      if (url) {
        if (this._img.getAttribute('src') !== url) {
          this._img.src = url;
          this._ghost.src = url;
        }
        this._img.style.display = 'block';
        this._empty.style.display = 'none';
        this.setAttribute('data-filled', '');
        this._clampView();
        this._applyView();
      } else {
        this._img.style.display = 'none';
        this._img.removeAttribute('src');
        this._ghost.removeAttribute('src');
        this._empty.style.display = 'flex';
        this.removeAttribute('data-filled');
      }
    }
  }

  if (!customElements.get('image-slot')) {
    customElements.define('image-slot', ImageSlot);
  }
})();

    topW,edgeH,surfaceH,frameW,beamH,

/* ── live desk preview — Three.js orbit only ── */
function DeskPreview({sel,total}){
  const canvasRef=useRef(null);
  const sceneRef=useRef(null);
  const overlayRef=useRef(null);
  const engineRef=useRef(null);
  const [status,setStatus]=useState("loading");
  const [activeView,setActiveView]=useState("front");
  const [buildOpen,setBuildOpen]=useState(()=>{
    try{return localStorage.getItem("ff.buildOpen")!=="0";}catch(e){return true;}
  });
  const layout=calcDeskLayout(sel);
  const {length,breadth,thick}=layout;

  const toggleBuild=()=>{
    setBuildOpen(v=>{
      const next=!v;
      try{localStorage.setItem("ff.buildOpen",next?"1":"0");}catch(e){}
      return next;
    });
  };

  const pickView=(mode)=>{
    setActiveView(mode);
    engineRef.current?.setView(mode);
  };

  useLayoutEffect(()=>{
    let engine=null;
    let cancelled=false;
    const mount=()=>{
      const el=canvasRef.current;
      if(cancelled||!el||!window.DeskPreview3D||engineRef.current) return false;
      if(el.clientWidth<24||el.clientHeight<24) return false;
      try{
        engine=new window.DeskPreview3D(el,{onViewChange:(mode)=>setActiveView(mode)});
        engineRef.current=engine;
        engine.updateFromSel(sel);
        engine.setView("front");
        setStatus("ready");
        return true;
      }catch(err){
        console.warn("3D preview unavailable",err);
        setStatus("error");
        return false;
      }
    };
    const onReady=()=>mount();
    const onFail=()=>{if(!cancelled&&!engineRef.current) setStatus("error");};
    window.addEventListener("desk3d-ready",onReady);
    window.addEventListener("desk3d-error",onFail);
    const ro=new ResizeObserver(()=>mount());
    if(canvasRef.current) ro.observe(canvasRef.current);
    mount();
    const poll=setInterval(()=>{if(mount()) clearInterval(poll);},100);
    const fail=setTimeout(()=>{if(!cancelled&&!engineRef.current&&!window.DeskPreview3D) setStatus("error");},20000);
    return()=>{cancelled=true;clearInterval(poll);clearTimeout(fail);ro.disconnect();window.removeEventListener("desk3d-ready",onReady);window.removeEventListener("desk3d-error",onFail);engine?.dispose();engineRef.current=null;};
  },[]);

  useEffect(()=>{
    engineRef.current?.updateFromSel(sel);
  },[sel]);

  useEffect(()=>{
    const engine=engineRef.current;
    if(!engine||status!=="ready") return;
    if(!buildOpen){
      engine.setContentOffset(0);
      return;
    }
    const sync=()=>{
      const panel=overlayRef.current;
      const scene=sceneRef.current;
      if(!panel||!scene||!panel.offsetWidth) return;
      const ratio=panel.offsetWidth/Math.max(scene.clientWidth,1);
      engine.setContentOffset(Math.min(ratio*0.52,0.28));
    };
    sync();
    const ro=new ResizeObserver(sync);
    if(overlayRef.current) ro.observe(overlayRef.current);
    if(sceneRef.current) ro.observe(sceneRef.current);
    return()=>ro.disconnect();
  },[buildOpen,status,sel]);

  return (
    <>
      <div className="viewer__topbar">
        <div className="viewer__toolbar" role="toolbar" aria-label="Preview view">
          {["front","top","side"].map(v=>(
            <button key={v} type="button" className={"viewer__viewbtn"+(activeView===v?" on":"")} onClick={()=>pickView(v)}>{v}</button>
          ))}
        </div>
      </div>
      <div className={"scene scene--3d scene--drag"+(buildOpen?" scene--desk-front":"")} ref={sceneRef}>
        <SelectionSummary sel={sel} total={total} overlay layout={layout} open={buildOpen} onToggle={toggleBuild} overlayRef={overlayRef}/>
        {status==="loading"&&<p className="desk-preview-loading">Loading 3D preview…</p>}
        {status==="error"&&<p className="desk-preview-loading">3D preview couldn’t load. Try refreshing the page.</p>}
        <div className="desk-stage desk-stage--3d desk-canvas" ref={canvasRef}/>
      </div>
    </>
  );
}

/* ── Stripe Checkout ── */
function Checkout({open,onClose,sel,total,paid}){
  const [email,setEmail]=useState("");
  const [stage,setStage]=useState("form"); // form | processing | done | error
  const [err,setErr]=useState("");
  useEffect(()=>{
    if(open){
      setErr("");
      setStage(paid ? "done" : "form");
    }
  },[open,paid]);
  if(!open) return null;

  const valid = /@/.test(email);

  const pay=async (e)=>{
    e.preventDefault();
    if(!valid || stage==="processing") return;
    setStage("processing");
    setErr("");
    try{
      const res=await fetch("/api/create-checkout-session",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ sel, email, total }),
      });
      const data=await res.json().catch(()=>({}));
      if(!res.ok) throw new Error(data.error||"Checkout failed");
      if(!data.url) throw new Error("No checkout URL returned");
      window.location.href=data.url;
    }catch(ex){
      setStage("error");
      setErr(ex.message||"Something went wrong");
    }
  };

  return (
    <div className={"co show"} role="dialog" aria-modal="true">
      <div className="co__scrim" onClick={stage==="processing"?null:onClose}/>
      <div className="co__sheet">
        <button className="co__close" onClick={onClose} aria-label="Close"><X/></button>

        {stage==="done" ? (
          <div className="co__done">
            <div className="co__done-ic"><BigCheck/></div>
            <h2>Payment received</h2>
            <p>Thank you. Your made-to-order desk is confirmed. We’ll email {email||"your receipt"} and begin production. Delivery in 3–4 weeks.</p>
            <button className="pay" onClick={onClose}>Done</button>
          </div>
        ) : (<>
          <div className="co__left">
            <div className="co__merchant"><span className="brand__mark"><Leaf s={20}/></span> Furniture Factory</div>
            <div className="co__amount-lbl">Pay Furniture Factory</div>
            <div className="co__amount">{fmt(total)}<small>SGD</small></div>
            <dl className="co__lines">
              <div className="co__line"><dt>Standing desk, custom<small>{sel.motor} · {sel.topColour} {sel.material} · {sel.length}×{sel.breadth} · {sel.thickness}</small></dt><dd>{fmt(total)}</dd></div>
              <div className="co__line"><dt>Delivery & assembly<small>Singapore</small></dt><dd>Free</dd></div>
            </dl>
            <div className="co__total"><span>Total due</span><span>{fmt(total)}</span></div>
          </div>
          <form className="co__right" onSubmit={pay}>
            <h3 className="co__rh">Secure checkout</h3>
            <p className="co__rsub">Enter your email, then continue to Stripe to pay by card or PayNow.</p>
            <div className="field">
              <label className="field__l">Email</label>
              <input className="inp" type="email" placeholder="you@email.com" value={email} onChange={e=>setEmail(e.target.value)} required />
            </div>
            <button className="pay" type="submit" disabled={stage==="processing"||!valid}>
              {stage==="processing" ? (<><span className="pay__spin"/> Redirecting to Stripe…</>) : (<><Lock/> Pay {fmt(total)} with Stripe</>)}
            </button>
            {stage==="error" && err ? <p className="co__terms" style={{color:"#b3261e"}}>{err}</p> : null}
            <div className="co__secure"><Lock s={12}/> Payments are secure and encrypted</div>
            <div className="co__powered">Powered by <b>Stripe</b></div>
            <div className="co__terms">You’ll be redirected to Stripe’s hosted checkout. Your desk configuration is saved with the order.</div>
          </form>
        </>)}
      </div>
    </div>
  );
}

  const [added,setAdded]=useState(false);
  const [toast,setToast]=useState(null);
  const [checkout,setCheckout]=useState(false);
  const [emptyCart,setEmptyCart]=useState(false);
  const [paid,setPaid]=useState(false);
  const tt=useRef(null);
  useEffect(()=>{localStorage.setItem("ff.cfg",JSON.stringify(sel));},[sel]);
  useEffect(()=>{localStorage.setItem("ff.cart",JSON.stringify(cart));},[cart]);
  useEffect(()=>{document.body.style.overflow=(checkout||emptyCart)?"hidden":"";},[checkout,emptyCart]);
  useEffect(()=>{
    const p=new URLSearchParams(window.location.search);
    if(p.get("paid")==="1"){
      setPaid(true);
      setCheckout(true);
      setCart(0);
      localStorage.setItem("ff.cart","0");
      window.history.replaceState({}, "", window.location.pathname);
    }else if(p.get("cancelled")==="1"){
      setToast({t:"Checkout cancelled",b:"Your desk configuration is still saved. Try again when ready."});
      clearTimeout(tt.current);tt.current=setTimeout(()=>setToast(null),4200);
      window.history.replaceState({}, "", window.location.pathname);
    }else if(p.get("checkout")==="1"){
      let n=0;
      try{n=JSON.parse(localStorage.getItem("ff.cart"))||0;}catch(e){}
      if(n>0) setCheckout(true);
      else setEmptyCart(true);
      window.history.replaceState({}, "", window.location.pathname);
    }
  },[]);
  const set=(k)=>(v)=>{setSel(s=>({...s,[k]:v}));setAdded(false);};

  const motor=FRAME_MOTOR.find(m=>m.id===sel.motor);
  const frameColour=FRAME_COLOUR.find(c=>c.id===sel.frameColour);

    setCart(c=>c+1);setAdded(true);
    setToast({t:"Added to cart",b:`${sel.topColour} ${sel.material} top · ${sel.length} · ${sel.motor} frame · ${fmt(total)}`});
    clearTimeout(tt.current);tt.current=setTimeout(()=>setToast(null),3600);
  };

        <h1>Customise your standing desk</h1>

            <div className="viewer__head">

              </div>
            </div>
            <div className="viewer__body">

                <div className="bill__r"><dt>{sel.thickness} top</dt><dd className={thickness.add===0?"zero":""}>{z(thickness.add)}</dd></div>
                <div className="bill__r"><dt>{sel.edge} edge</dt><dd className={edge.add===0?"zero":""}>{z(edge.add)}</dd></div>
                <hr className="bill__rule"/>
                <div className="bill__t"><dt>Total</dt><dd>{fmt(total)}<small>SGD</small></dd></div>
              </dl>
              <div className="btns">
                <button type="button" className="btn btn--primary" onClick={()=>setCheckout(true)}>Checkout securely</button>
                <button type="button" className={"btn btn--ghost"+(added?" added":"")} onClick={addToCart}>{added?"Added to cart ✓":"Add to cart"}</button>
              </div>
              <div className="assure">
                <span><Tick/> Free delivery & assembly</span>
                <span><Tick/> 10-year frame warranty</span>
              </div>
              <p className="fine">Made to order in our factory · 3–4 weeks · Singapore</p>
            </div>
          </div>
        </div>
        </div>
      </main>

      <footer className="hd site-foot">
        <div className="foot__inner">
          <div className="foot__left">
            <a className="brand" href="/">Furniture Factory</a>
            <span className="foot__c">Factory direct · Singapore</span>
          </div>
          <span className="foot__year">© 2026</span>
        </div>
      </footer>
      </div>

      <div className={"toast"+(toast?" show":"")} aria-live="polite">
        {toast&&(<><div className="toast__t">{toast.t}</div><div className="toast__b">{toast.b}</div></>)}
      </div>

      <Checkout open={checkout} onClose={()=>{setCheckout(false);setPaid(false);}} sel={sel} total={total} paid={paid} />
      <EmptyCart open={emptyCart} onClose={()=>setEmptyCart(false)}/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
  <script src="/customise-preview-scroll.js"></script>
  <script src="/shared-nav.js"></script>
  <script src="/shared-contact-fab.js"></script>
</body>
</html>
